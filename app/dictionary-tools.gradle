class Wrapper {
	static def getDictionaryLineData(String line, String delimiter) {
		String[] parts = line.split(delimiter, 3)
		String word = parts[0]
		String transcription = parts.length > 1 && parts[1] =~ "^[a-zA-Z]+\$" ? parts[1] : ""

		int frequency
		try {
			int partsElement = transcription.isEmpty() ? 1 : 2
			frequency = (parts.length > partsElement ? parts[partsElement] : "0") as int
		} catch (Exception ignored) {
			frequency = -1
		}

		return [word, transcription, frequency]
	}


	static def wordToDigitSequence(Locale locale, String word, HashMap<String, String> sounds, boolean isTranscribed, String transparentChars = "") {
		def sequence = new StringBuilder()

		final String normalizedWord = isTranscribed ? word : word.toUpperCase(locale)
		String currentSound = ""

		for (int i = 0, end = normalizedWord.length() - 1; i <= end; i++) {
			char currentChar = normalizedWord.charAt(i)

			// Transparent characters (e.g. the apostrophe in a contraction) stay in the word but produce
			// no key token, so "that's" encodes to the same sequence as "thats". The runtime encoder,
			// NaturalLanguage.getDigitSequenceForWord, reads the same declaration and skips the same
			// characters, so the two encoders cannot structurally diverge. See SID-6.
			if (transparentChars.indexOf((int) currentChar) >= 0) {
				continue
			}

			char nextChar = i < end ? normalizedWord.charAt(i + 1) : 0
			int nextCharType = Character.getType(nextChar)

			currentSound += currentChar

			// charAt(i) returns "ΐ" as three separate characters, but they must be treated as one.
			if (
					locale.getLanguage() == "el"
					&& (nextCharType == Character.NON_SPACING_MARK || nextCharType == Character.ENCLOSING_MARK || nextCharType == Character.COMBINING_SPACING_MARK)
			) {
				continue
			}

			if (!isTranscribed || i == end || Character.isUpperCase(nextChar)) {
				if (!sounds.containsKey(currentSound)) {
					throw new IllegalArgumentException("Sound or layout entry '${currentSound}' does not belong to the language sound list: ${sounds}.")
				} else {
					sequence << sounds.get(currentSound)
					currentSound = ""
				}
			}
		}

		if (sequence.isEmpty()) {
			throw new IllegalArgumentException("The word does not contain any valid sounds.")
		}

		return sequence.toString()
	}


	static def getLanguageHash(File definitionFile, File dictionaryFile, File supplementFile = null) {
		def definitionHash = definitionFile != null && definitionFile.exists() ? sha256(definitionFile.path) : ""
		def dictionaryHash = dictionaryFile != null && dictionaryFile.exists() ? sha256(dictionaryFile.path) : ""
		// Fold the optional supplement into the freshness hash, so editing it triggers a rebuild and a
		// bumped .props.yml hash (which force-refreshes the dictionary for existing users). See SID-6.
		def supplementHash = supplementFile != null && supplementFile.exists() ? sha256(supplementFile.path) : ""
		return definitionHash + dictionaryHash + supplementHash
	}


	/**
	 * Reads a dictionary's word/frequency lines, appends an optional supplement file's lines, and — for
	 * languages that opted into transparency — filters out any entry whose FIRST character is transparent.
	 * That leading-transparent filter removes the suffix fragments (e.g. "'s", "'ll") that would otherwise
	 * become bare junk ("s", "ll") once the apostrophe is dropped from the sequence. Languages with no
	 * transparentChars (the default) are returned untouched, so their apostrophe-initial words — e.g. the
	 * ~127 Turkish clitic forms — are preserved. Both encoders (validate + convert) read through this so
	 * they process identical content. See SID-6.
	 */
	static List<String> readDictionaryLines(File dictionaryFile, File supplementFile, String transparentChars = "") {
		List<String> lines = new ArrayList<>(dictionaryFile.readLines())
		if (supplementFile != null && supplementFile.exists()) {
			lines.addAll(supplementFile.readLines())
		}
		if (transparentChars.isEmpty()) {
			return lines
		}
		return lines.findAll { line -> line.isEmpty() || transparentChars.indexOf((int) line.charAt(0)) < 0 }
	}


	static def sha256(String filePath) {
		def parts = "sha256sum $filePath".execute().text.trim().split(" ")
		return parts.length > 0 ? parts[0] : ""
	}
}

ext.DictionaryTools = Wrapper
